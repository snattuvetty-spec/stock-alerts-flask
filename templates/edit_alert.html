{% extends "base.html" %}
{% block title %}Edit Alert{% endblock %}
{% block content %}
<div class="page-title">✏️ Edit Alert — {{ alert.symbol }}</div>
<div style="max-width:480px;">
<div class="card">
<div class="card-body">
    <form method="POST">
        <div class="form-group">
            <label>Symbol</label>
            <input type="text" value="{{ alert.symbol }}" disabled
                   style="background:#f3f4f6;color:#6b7280;">
        </div>
        <div class="form-group">
            <label>Target Price ($)</label>
            <input type="number" name="target" step="any" min="0.001"
                   value="{{ alert.target }}" placeholder="0.000" required>
        </div>
        <div class="form-group">
            <label>Alert When Price Goes</label>
            <select name="alert_type">
                <option value="above" {{ 'selected' if alert.type == 'above' }}>🔼 Above target</option>
                <option value="below" {{ 'selected' if alert.type == 'below' }}>🔽 Below target</option>
            </select>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <a href="/dashboard" class="btn btn-outline" style="flex:1;justify-content:center;">← Cancel</a>
            <button type="submit" class="btn btn-primary" style="flex:2;">💾 Save Changes</button>
        </div>
    </form>
</div>
</div>
</div>
{% endblock %}
