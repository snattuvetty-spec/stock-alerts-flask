<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Stock Alerts Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #00c6ff;
            --brand-dark: #0072ff;
            --glow: rgba(0,198,255,0.35);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.15);
            --input-bg: rgba(255,255,255,0.08);
            --card-bg: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020b18;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: floatBlob 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        .bg-blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #0072ff, transparent); top: -100px; left: -100px; animation-delay: 0s; }
        .bg-blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #00c6ff, transparent); bottom: -80px; right: -80px; animation-delay: 3s; }
        .bg-blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #00e5ff, transparent); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: 1.5s; }

        @keyframes floatBlob {
            from { transform: scale(1) translate(0,0); }
            to { transform: scale(1.15) translate(20px, 20px); }
        }

        /* Grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,198,255,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,198,255,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .auth-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Logo */
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            display: inline-block;
            margin-bottom: 14px;
            position: relative;
            animation: pulseLogo 3s ease-in-out infinite;
        }
        .logo-icon::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 34px;
            background: radial-gradient(circle, rgba(255,165,0,0.45) 0%, rgba(0,198,255,0.25) 50%, transparent 75%);
            animation: pulseLogo 3s ease-in-out infinite;
            z-index: -1;
        }
        .logo-icon img {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            display: block;
            filter: drop-shadow(0 0 16px rgba(255,165,0,0.6)) drop-shadow(0 0 32px rgba(0,198,255,0.4));
        }
        @keyframes pulseLogo {
            0%, 100% { filter: drop-shadow(0 0 16px rgba(255,165,0,0.5)) drop-shadow(0 0 32px rgba(0,198,255,0.3)); }
            50% { filter: drop-shadow(0 0 28px rgba(255,165,0,0.9)) drop-shadow(0 0 56px rgba(0,198,255,0.6)); }
        }
        .auth-logo h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .auth-logo h1 span { color: var(--brand); }
        .auth-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* Card */
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
        .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

        /* Form */
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus {
            border-color: var(--brand);
            background: rgba(0,198,255,0.08);
            box-shadow: 0 0 0 3px rgba(0,198,255,0.15);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            color: white;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,114,255,0.4);
            letter-spacing: 0.3px;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0,198,255,0.5); }
        .btn:active { transform: translateY(0); }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn.loading .btn-spinner { display: inline-block; }

        /* Alerts */
        .alert-error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #ff8a80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #4ade80; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-success a { color: #00c6ff; }

        footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        /* Mobile fullscreen - sticky header + scrollable form */
        @media (max-width: 480px) {
            body {
                padding: 0;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                height: 100vh;
                overflow: hidden;
            }
            .auth-wrapper {
                max-width: 100%;
                padding: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .auth-logo {
                background: #020b18;
                padding: 24px 24px 18px;
                margin-bottom: 0;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(0,198,255,0.12);
                position: relative;
                z-index: 2;
            }
            /* Smaller logo on signup since there are more fields */
            .auth-logo .logo-icon { width: 64px; height: 64px; }
            .auth-logo .logo-icon img { width: 64px; height: 64px; }
            .auth-logo h1 { font-size: 22px; }
            .auth-card {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: none;
                padding: 20px 20px 40px;
            }
            footer {
                padding: 12px;
                text-align: center;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>

<div class="auth-wrapper">
    <div class="auth-logo">
        <div class="logo-icon"><img src="/static/icon-192.png" alt="Stock Alerts Pro"></div>
        <h1>Stock Alerts <span>Pro</span></h1>
        <p>By Natts Digital</p>
    </div>

    <div class="auth-card">
        <div class="tabs">
            <a href="/" class="tab">🔐 Login</a>
            <a href="/signup" class="tab active">📝 Sign Up</a>
            <a href="/forgot" class="tab">🔑 Forgot</a>
        </div>

        {% if error %}
        <div class="alert-error">❌ {{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert-success">✅ {{ success }} <a href="/">Login here</a></div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your full name" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 6 characters" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Repeat password" autocomplete="new-password" required>
            </div>
            <!-- Promo Code (hidden by default) -->
            <div style="text-align:center;margin-bottom:10px;">
                <a href="#" onclick="togglePromo(event)" id="promoToggle"
                   style="font-size:12px;color:rgba(0,198,255,0.7);text-decoration:none;">
                    🎟️ Have a promo code?
                </a>
            </div>
            <div id="promoGroup" style="display:none;margin-bottom:14px;">
                <label style="display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;">Promo Code</label>
                <input type="text" name="promo_code" id="promoInput"
                       placeholder="Enter promo code"
                       style="text-transform:uppercase;"
                       autocomplete="off">
                <div id="promoMsg" style="font-size:12px;margin-top:6px;display:none;"></div>
            </div>

            <button type="submit" class="btn" id="signupBtn">
                <span class="btn-spinner"></span>
                <span class="btn-text">📝 Create Account</span>
            </button>
        </form>
    </div>
</div>

<footer>© 2026 Natts Digital. All rights reserved.</footer>

<script>
function togglePromo(e) {
    e.preventDefault();
    const group = document.getElementById('promoGroup');
    const toggle = document.getElementById('promoToggle');
    if (group.style.display === 'none') {
        group.style.display = 'block';
        toggle.textContent = '✕ Hide promo code';
        document.getElementById('promoInput').focus();
    } else {
        group.style.display = 'none';
        toggle.textContent = '🎟️ Have a promo code?';
        document.getElementById('promoInput').value = '';
        document.getElementById('promoMsg').style.display = 'none';
    }
}

// Auto uppercase promo code as user types
document.getElementById('promoInput').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
    document.getElementById('promoMsg').style.display = 'none';
});

let promoValidated = false; // tracks if user already confirmed invalid code

document.querySelector('form').addEventListener('submit', async function(e) {
    const promoInput = document.getElementById('promoInput');
    const promoGroup = document.getElementById('promoGroup');
    const promoMsg = document.getElementById('promoMsg');
    const code = promoInput.value.trim().toUpperCase();

    // If promo field is visible and has a value and not yet validated
    if (promoGroup.style.display !== 'none' && code && !promoValidated) {
        e.preventDefault();

        // Validate code against server
        try {
            const res = await fetch(`/validate_promo?code=${encodeURIComponent(code)}`);
            const data = await res.json();

            if (data.valid) {
                // Valid code — show success and submit
                promoMsg.style.cssText = 'display:block;color:#4ade80;font-size:13px;margin-top:6px;';
                promoMsg.textContent = `✅ Promo code applied! You get ${data.trial_days} days free trial.`;
                promoValidated = true;
                setTimeout(() => this.submit(), 800);
            } else {
                // Invalid code — show warning with two options
                promoMsg.style.cssText = 'display:block;margin-top:8px;';
                promoMsg.innerHTML = `
                    <div style="background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.4);
                                border-radius:8px;padding:12px;font-size:13px;color:#ff8a80;">
                        ⚠️ Invalid promo code <strong>${code}</strong>.<br>
                        <span style="color:rgba(255,255,255,0.6);">What would you like to do?</span>
                        <div style="display:flex;gap:8px;margin-top:10px;">
                            <button type="button" onclick="fixPromoCode()"
                                style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(0,198,255,0.5);
                                       background:rgba(0,198,255,0.1);color:#00c6ff;font-size:12px;font-weight:600;cursor:pointer;">
                                ✏️ Fix Code
                            </button>
                            <button type="button" onclick="continueWithout21()"
                                style="flex:1;padding:8px;border-radius:6px;border:none;
                                       background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;cursor:pointer;">
                                Continue with 21 days →
                            </button>
                        </div>
                    </div>`;
            }
        } catch(err) {
            // Network error — just submit normally
            promoValidated = true;
            this.submit();
        }
        return;
    }

    // Normal submit
    const btn = document.getElementById('signupBtn');
    btn.classList.add('loading');
    btn.querySelector('.btn-text').textContent = 'Creating account...';
    btn.disabled = true;
    setTimeout(() => {
        btn.classList.remove('loading');
        btn.querySelector('.btn-text').textContent = '📝 Create Account';
        btn.disabled = false;
    }, 8000);
});

function fixPromoCode() {
    document.getElementById('promoMsg').style.display = 'none';
    document.getElementById('promoInput').focus();
    document.getElementById('promoInput').select();
}

function continueWithout21() {
    // Clear promo code and submit
    document.getElementById('promoInput').value = '';
    promoValidated = true;
    document.querySelector('form').submit();
}
</script>
</body>
</html>
